version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: crm_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm_portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: crm_web
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/crm_portal
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - uploads_secure:/app/uploads_secure
    depends_on:
      - db

volumes:
  postgres_data:
    driver: local
  uploads_secure:
    driver: local
